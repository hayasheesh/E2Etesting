name: CI Pipeline

on:
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  ci-lint-and-check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run lint and type checks
        run: |
          pip install '.[dev]'
          flake8 src
          isort --check src
          black --check src
